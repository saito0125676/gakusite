        <rect class="logo-sq logo-sq--turq" x="230" y="200" width="180" height="180" fill="none" stroke="#3FC1C9" stroke-width="14" stroke-linejoin="round"/>

  <main>
    <section id="pricing" class="section-card">
      <h2>料金プラン</h2>

      <div class="pricing-table-wrap">
        <table class="pricing-table">
          <thead>
            <tr>
              <th>項目</th>
              <th>内容</th>
              <th>金額</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>制作費</td>
              <td>ホームページ制作(初期費用)</td>
              <td>20,000円</td>
            </tr>
            <tr>
              <td>更新費</td>
              <td>ページの変更・追加。内容の大きさで変動(合格実績・夏期講習など大幅な追加は上限)</td>
              <td>1,000円〜5,000円</td>
            </tr>
            <tr>
              <td>継続費</td>
              <td>ドメイン代を含む、月々の維持費</td>
              <td>4,000円 / 月</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="pricing-guarantee">
        <span class="pricing-guarantee-icon" aria-hidden="true">&check;</span>
        <p><strong>違約金・解約金は一切かかりません。</strong>継続いただけない場合も、いつでもやめられます。</p>
