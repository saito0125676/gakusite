    <section id="pricing" class="section-card">
      <h2>料金プラン</h2>

      <div class="pricing-list">
        <div class="pricing-item">
          <div class="pricing-item-head">

        </div>
        <div class="pricing-item">
          <div class="pricing-item-head">
            <span class="pricing-item-name">継続費</span>
            <span class="pricing-item-price">4,000円 / 月</span>
          </div>
          <p class="pricing-item-desc">ドメイン代を含む、月々の維持費</p>
        </div>
      </div>

      <div class="pricing-guarantee">
        <span class="pricing-guarantee-icon" aria-hidden="true">&check;</span>
        <p><strong>違約金・解約金は一切かかりません。</strong>継続いただけない場合も、いつでもやめられます。</p>
