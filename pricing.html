<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <title>料金 | 学サイト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="logo"><a href="index.html"><img src="assets/logo_header.svg" alt="学サイト"></a></h1>
    <nav>
      <a href="index.html">ホーム</a>
      <a href="about.html">私たちについて</a>
      <a href="service.html">サービス</a>
      <a href="pricing.html">料金</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <section id="pricing">
      <h2>料金プラン</h2>

      <table class="pricing-table">
        <thead>
          <tr>
            <th>項目</th>
            <th>内容</th>
            <th>金額</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>制作費</td>
            <td>ホームページ制作(初期費用)</td>
            <td>20,000円</td>
          </tr>
          <tr>
            <td>更新費</td>
            <td>ページの変更・追加。内容の大きさで変動(合格実績・夏期講習など大幅な追加は上限)</td>
            <td>1,000円〜5,000円</td>
          </tr>
          <tr>
            <td>継続費</td>
            <td>ドメイン代を含む、月々の維持費</td>
            <td>4,000円 / 月</td>
          </tr>
        </tbody>
      </table>

      <div class="pricing-guarantee">
        <span class="pricing-guarantee-icon" aria-hidden="true">&check;</span>
        <p><strong>違約金・解約金は一切かかりません。</strong>継続いただけない場合も、いつでもやめられます。</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 学サイト</p>
  </footer>

  <a class="consult-float" href="contact.html">
    <span class="consult-float-dot" aria-hidden="true"></span>
    無料相談受け付け中
  </a>
